<!-- ============================================================
     block-counters.html — Анимированные счётчики
     shen.market | изолированный блок, префикс .shen-cnt-
     ============================================================ -->
<section class="shen-cnt-section">
  <style>
    .shen-cnt-section {
      background: linear-gradient(135deg, #5a2121 0%, #8f261d 60%, #7b2119 100%);
      padding: 60px 15px;
      font-family: 'Arial', sans-serif;
      box-sizing: border-box;
    }

    .shen-cnt-container {
      max-width: 1485px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .shen-cnt-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      position: relative;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .shen-cnt-item.shen-cnt-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .shen-cnt-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: rgba(255, 255, 255, 0.2);
    }

    .shen-cnt-icon {
      width: 52px;
      height: 52px;
      margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .shen-cnt-icon svg {
      width: 28px;
      height: 28px;
      fill: #fae6e6;
    }

    .shen-cnt-value {
      font-size: 52px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .shen-cnt-suffix {
      font-size: 34px;
      font-weight: 700;
      color: #fae6e6;
    }

    .shen-cnt-label {
      font-size: 15px;
      color: rgba(250, 230, 230, 0.85);
      line-height: 1.4;
      max-width: 160px;
    }

    /* stagger */
    .shen-cnt-item:nth-child(1) { transition-delay: 0s; }
    .shen-cnt-item:nth-child(2) { transition-delay: 0.12s; }
    .shen-cnt-item:nth-child(3) { transition-delay: 0.24s; }
    .shen-cnt-item:nth-child(4) { transition-delay: 0.36s; }

    @media (max-width: 900px) {
      .shen-cnt-container {
        grid-template-columns: repeat(2, 1fr);
      }
      .shen-cnt-item:nth-child(1)::after,
      .shen-cnt-item:nth-child(3)::after { display: none; }
      .shen-cnt-item:nth-child(2)::after { display: none; }
    }

    @media (max-width: 520px) {
      .shen-cnt-container {
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }
      .shen-cnt-value { font-size: 38px; }
      .shen-cnt-suffix { font-size: 26px; }
      .shen-cnt-item { padding: 28px 12px; }
    }
  </style>

  <div class="shen-cnt-container">

    <!-- 1. 10 лет на рынке -->
    <div class="shen-cnt-item" data-target="10" data-suffix="" data-postfix=" лет">
      <div class="shen-cnt-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
        </svg>
      </div>
      <div class="shen-cnt-value">
        <span class="shen-cnt-num">0</span><span class="shen-cnt-suffix"></span>
      </div>
      <div class="shen-cnt-label">лет на рынке Крыма</div>
    </div>

    <!-- 2. 5 000+ товаров -->
    <div class="shen-cnt-item" data-target="5000" data-suffix="+" data-postfix="">
      <div class="shen-cnt-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
        </svg>
      </div>
      <div class="shen-cnt-value">
        <span class="shen-cnt-num">0</span><span class="shen-cnt-suffix">+</span>
      </div>
      <div class="shen-cnt-label">товаров в каталоге</div>
    </div>

    <!-- 3. 1 000+ клиентов -->
    <div class="shen-cnt-item" data-target="1000" data-suffix="+" data-postfix="">
      <div class="shen-cnt-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
      </div>
      <div class="shen-cnt-value">
        <span class="shen-cnt-num">0</span><span class="shen-cnt-suffix">+</span>
      </div>
      <div class="shen-cnt-label">довольных клиентов</div>
    </div>

    <!-- 4. Доставка 1-2 дня -->
    <div class="shen-cnt-item" data-target="2" data-suffix="" data-postfix=" дня">
      <div class="shen-cnt-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
        </svg>
      </div>
      <div class="shen-cnt-value">
        1–<span class="shen-cnt-num">0</span><span class="shen-cnt-suffix"></span>
      </div>
      <div class="shen-cnt-label">дня — срок доставки по Крыму</div>
    </div>

  </div><!-- /.shen-cnt-container -->

  <script>
    (function () {
      var items = document.querySelectorAll('.shen-cnt-item');
      var animated = false;

      function easeOut(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function formatNumber(n) {
        return n >= 1000 ? (n / 1000).toFixed(0) + '\u00a0000' : String(n);
      }

      function animateCounter(el) {
        var target = parseInt(el.getAttribute('data-target'), 10);
        var numEl = el.querySelector('.shen-cnt-num');
        var duration = 1600;
        var startTime = null;

        function step(timestamp) {
          if (!startTime) startTime = timestamp;
          var elapsed = timestamp - startTime;
          var progress = Math.min(elapsed / duration, 1);
          var current = Math.round(easeOut(progress) * target);
          numEl.textContent = formatNumber(current);
          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            numEl.textContent = formatNumber(target);
          }
        }
        requestAnimationFrame(step);
      }

      function runAll() {
        if (animated) return;
        animated = true;
        items.forEach(function (item) {
          item.classList.add('shen-cnt-visible');
          animateCounter(item);
        });
      }

      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              runAll();
              observer.disconnect();
            }
          });
        }, { threshold: 0.25 });
        observer.observe(document.querySelector('.shen-cnt-section'));
      } else {
        runAll();
      }
    })();
  </script>
</section>
